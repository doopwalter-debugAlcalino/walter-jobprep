
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Walter JobPrep — Moçambique</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0f1e; min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #0f172a; color: #f1f5f9; }
    .header { background: rgba(15,23,42,0.97); border-bottom: 1px solid #1e293b; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 18px; }
    .logo-icon { width: 32px; height: 32px; background: #2563eb; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .nav button { background: none; border: none; color: #64748b; font-size: 13px; cursor: pointer; padding: 6px 10px; border-radius: 8px; }
    .nav button:hover { color: #60a5fa; background: rgba(96,165,250,0.08); }
    .main { padding: 20px 16px; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 999px; background: rgba(37,99,235,0.1); border: 1px solid rgba(37,99,235,0.25); color: #60a5fa; font-size: 11px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 10px; }
    .gradient-text { background: linear-gradient(135deg, #60a5fa, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 16px; }
    .stats { display: flex; gap: 14px; font-size: 12px; color: #64748b; justify-content: center; margin-bottom: 28px; }
    .section-title { text-align: center; font-size: 16px; font-weight: 600; margin: 20px 0 16px; }
    .persona-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 24px; }
    .persona-card { background: rgba(30,41,59,0.5); border: 1px solid #334155; border-radius: 16px; padding: 18px 14px; cursor: pointer; text-align: center; transition: all 0.2s; }
    .persona-card:hover { border-color: #3b82f6; background: rgba(30,41,59,0.9); transform: translateY(-2px); }
    .persona-icon { font-size: 32px; margin-bottom: 8px; }
    .persona-name { font-size: 14px; font-weight: 600; }
    .persona-role { font-size: 10px; color: #64748b; margin-top: 4px; }
    .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
    .feature { background: rgba(30,41,59,0.4); border: 1px solid #1e293b; border-radius: 14px; padding: 16px 12px; cursor: pointer; text-align: center; }
    .feature:hover { background: rgba(30,41,59,0.8); }
    .feature-icon { font-size: 24px; margin-bottom: 6px; }
    .feature h3 { font-size: 12px; }
    .feature p { font-size: 10px; color: #64748b; }
    .stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; background: rgba(15,23,42,0.6); border: 1px solid #1e293b; border-radius: 18px; padding: 20px 16px; text-align: center; margin-bottom: 20px; }
    .stats-bar .num { font-size: 22px; font-weight: 600; }
    .stats-bar .lbl { font-size: 9px; color: #475569; text-transform: uppercase; }
    .back-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    .back-btn:hover { color: #fff; }
    .btn-primary { width: 100%; background: #2563eb; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 500; color: #fff; cursor: pointer; margin-top: 12px; }
    .btn-primary:hover { background: #1d4ed8; }
    .search-input { width: 100%; background: #0a0f1e; border: 1px solid #334155; border-radius: 12px; color: #fff; padding: 14px; margin-bottom: 16px; }
    .company-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .company-btn { background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #94a3b8; font-size: 12px; padding: 8px 12px; cursor: pointer; }
    .company-btn:hover { border-color: #3b82f6; color: #fff; }
    .cv-area textarea { width: 100%; background: #0a0f1e; border: 1px solid #334155; border-radius: 12px; color: #e2e8f0; padding: 14px; min-height: 120px; }
    .template-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
    .template-card { background: #1e293b; border-radius: 14px; border: 1px solid #334155; text-align: center; padding: 12px; }
    .template-card h3 { font-size: 13px; margin-bottom: 6px; }
    .template-btn { background: #2563eb; border: none; border-radius: 8px; padding: 8px; color: #fff; cursor: pointer; width: 100%; font-size: 12px; }
    .premium-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); font-size: 10px; font-weight: bold; padding: 4px 10px; border-radius: 999px; display: inline-block; }
    .upload-area { border: 2px dashed #334155; border-radius: 14px; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 12px; }
    .upload-area:hover { border-color: #3b82f6; background: rgba(37,99,235,0.08); }
    .chat-wrap { display: flex; flex-direction: column; height: 520px; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; background: rgba(15,23,42,0.5); border-radius: 16px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 13px; max-width: 85%; line-height: 1.5; }
    .msg.bot .msg-bubble { background: #1e293b; border: 1px solid #334155; border-top-left-radius: 3px; }
    .msg.user .msg-bubble { background: #2563eb; border-top-right-radius: 3px; }
    .input-row { display: flex; gap: 8px; background: #1e293b; border-radius: 14px; border: 1px solid #334155; padding: 5px; }
    .input-row input { flex: 1; background: none; border: none; outline: none; color: #fff; padding: 10px; font-size: 13px; }
    .send-btn { background: #2563eb; border: none; border-radius: 10px; width: 40px; cursor: pointer; font-size: 18px; color: white; }
    .typing { display: flex; gap: 4px; padding: 10px 14px; background: #1e293b; border-radius: 14px; width: fit-content; }
    .dot { width: 6px; height: 6px; background: #60a5fa; border-radius: 50%; animation: pulse 1s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
    .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #1e293b; border-left: 4px solid #10b981; padding: 12px; border-radius: 12px; z-index: 1000; animation: slideUp 0.3s ease; text-align: center; font-size: 13px; }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .tip-box { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); border-radius: 12px; padding: 10px; margin-top: 8px; font-size: 11px; text-align: center; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo"><div class="logo-icon">📄</div> Walter JobPrep</div>
    <div class="nav">
      <button onclick="showView('home')">Início</button>
      <button onclick="showView('cv')">Validar CV</button>
      <button onclick="showView('templates')">Templates</button>
    </div>
  </div>
  <div class="main" id="app-content"></div>
</div>

<script>
const GROQ_KEY = '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';

const PERSONAS = {
  walter: { name: 'Walter Recrutador', role: 'Entrevista', icon: '💼', bg: 'rgba(37,99,235,0.2)', prompt: 'Você é o Walter, recrutador experiente em Moçambique. Use APENAS as perguntas obrigatórias na ordem certa. Nunca invente perguntas.' },
  maria: { name: 'Maria Escrita', role: 'Especialista CV', icon: '📄', bg: 'rgba(124,58,237,0.2)', prompt: 'Você é a Maria, especialista em currículos.' },
  antonio: { name: 'António Técnico', role: 'Prático', icon: '🔧', bg: 'rgba(71,85,105,0.2)', prompt: 'Você é o António, focado em habilidades técnicas.' },
  delfina: { name: 'Delfina Psicóloga', role: 'Confiança', icon: '⭐', bg: 'rgba(5,150,105,0.2)', prompt: 'Você é a Delfina, psicóloga de carreiras.' }
};

// ============================================
// AS 12 PERGUNTAS OBRIGATÓRIAS DO WALTER
// ============================================
const WALTER_QUESTIONS = [
  "Fale um pouco sobre você.",
  "Por que você quer trabalhar nesta empresa?",
  "Quais são seus pontos fortes?",
  "Quais são seus pontos fracos?",
  "Onde você se vê daqui a 5 anos?",
  "Por que devemos contratar você?",
  "Qual sua experiência anterior?",
  "Você sabe trabalhar em equipe? Dê um exemplo.",
  "Como você lida com pressão e prazos?",
  "Qual sua disponibilidade de horário?",
  "Qual sua pretensão salarial?",
  "Você tem alguma pergunta para nós?"
];

const COMPANIES = ['Recheio','Mozal','CMC','TotalEnergies','BIM','Sasol','Shoprite','KFC','Coca-Cola','EDM'];

let currentView = 'home';
let currentPersona = 'walter';
let currentCompany = '';
let messages = [];
let isLoading = false;
let questionIndex = 0;
let waitingForAnswer = false;

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function showView(view, personaId, companyName) {
  currentView = view;
  if (personaId) currentPersona = personaId;
  if (companyName !== undefined) currentCompany = companyName;
  if (view === 'chat' && messages.length === 0) {
    if (currentPersona === 'walter') {
      questionIndex = 0;
      waitingForAnswer = true;
      messages = [{ role: 'bot', text: `Olá! Sou o Walter, recrutador da ${currentCompany || 'empresa'}. Vamos começar a entrevista.\n\n${WALTER_QUESTIONS[0]}` }];
    } else {
      const p = PERSONAS[currentPersona];
      messages = [{ role: 'bot', text: `Olá! Sou ${p.name}. Como posso ajudar na sua carreira hoje?` }];
    }
  }
  render();
  if (view === 'chat') {
    setTimeout(() => { const a = document.getElementById('messages-area'); if(a) a.scrollTop = a.scrollHeight; }, 100);
    document.getElementById('msg-input')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
  }
}

function render() {
  const el = document.getElementById('app-content');
  if (currentView === 'home') el.innerHTML = renderHome();
  else if (currentView === 'cv') el.innerHTML = renderCV();
  else if (currentView === 'templates') el.innerHTML = renderTemplates();
  else if (currentView === 'company') el.innerHTML = renderCompany();
  else if (currentView === 'chat') el.innerHTML = renderChat();
  else if (currentView === 'payment') el.innerHTML = renderPayment();
}

function renderHome() {
  return `
    <div style="text-align:center;">
      <div class="badge">🇲🇿 O Futuro do Trabalho em Moçambique</div>
      <h1>Prepara-te para o <span class="gradient-text">Sucesso Profissional</span></h1>
      <p class="subtitle">Ajudamos-te a conseguir as melhores oportunidades.</p>
      <div class="stats"><span>👥 +5.000</span><span>🏆 85%</span><span>📍 Moçambique</span></div>
      <div class="section-title">Com quem queres treinar?</div>
      <div class="persona-grid">
        ${Object.entries(PERSONAS).map(([id, p]) => `<div class="persona-card" onclick="showView('company','${id}')"><div class="persona-icon" style="background:${p.bg}">${p.icon}</div><div class="persona-name">${p.name}</div><div class="persona-role">${p.role}</div></div>`).join('')}
      </div>
      <div class="features">
        <div class="feature" onclick="showView('cv')"><div class="feature-icon">📋</div><h3>Validar CV</h3><p>Análise gratuita</p></div>
        <div class="feature" onclick="showView('templates')"><div class="feature-icon">🎨</div><h3>Templates</h3><p>Design profissional</p></div>
        <div class="feature" onclick="showView('company','walter')"><div class="feature-icon">💬</div><h3>Entrevista</h3><p>Simulação com IA</p></div>
      </div>
      <div class="stats-bar">
        <div><div class="num">400+</div><div class="lbl">Empresas</div></div>
        <div><div class="num" style="color:#60a5fa">24/7</div><div class="lbl">Disponível</div></div>
        <div><div class="num" style="color:#a78bfa">100%</div><div class="lbl">Local</div></div>
        <div><div class="num" style="color:#34d399">Grátis</div><div class="lbl">Acesso</div></div>
      </div>
    </div>
  `;
}

function renderCompany() {
  return `
    <div style="text-align:center;">
      <div style="font-size:40px;">🏢</div>
      <h2 style="font-size:20px;">Escolha a empresa</h2>
      <p style="color:#94a3b8; margin-bottom:16px;">Selecione para começar a entrevista</p>
      <div class="company-grid">
        ${COMPANIES.map(c => `<button class="company-btn" onclick="showView('chat','${currentPersona}','${c}')">${c}</button>`).join('')}
      </div>
      <input class="search-input" id="custom-company" placeholder="Ou digite outra empresa..." />
      <button class="btn-primary" onclick="startCustom()">▶ Iniciar Entrevista</button>
      <button class="back-btn" onclick="showView('home')" style="margin-top:16px;">← Voltar</button>
    </div>
  `;
}

function startCustom() {
  const c = document.getElementById('custom-company')?.value.trim();
  if(c) showView('chat', currentPersona, c.toUpperCase());
  else showToast('Digite o nome da empresa');
}

function renderChat() {
  const p = PERSONAS[currentPersona];
  const isWalter = currentPersona === 'walter';
  const progress = isWalter ? `${questionIndex}/${WALTER_QUESTIONS.length}` : '';
  return `
    <div class="chat-wrap">
      <div style="background:#0f172a; padding:12px; border-bottom:1px solid #1e293b; display:flex; justify-content:space-between;">
        <div><strong>${p.name}</strong><span style="font-size:11px; margin-left:8px; color:#60a5fa;">${currentCompany} ${progress}</span></div>
        <button class="back-btn" onclick="showView('home')">← Sair</button>
      </div>
      <div class="messages" id="messages-area">
        ${messages.map(m => `<div class="msg ${m.role}"><div class="msg-bubble">${escapeHtml(m.text)}</div></div>`).join('')}
        ${isLoading ? '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>' : ''}
      </div>
      <div class="input-row">
        <input id="msg-input" placeholder="Digite sua resposta..." ${isLoading ? 'disabled' : ''} />
        <button class="send-btn" onclick="sendMessage()" ${isLoading ? 'disabled' : ''}>➤</button>
      </div>
      <div class="tip-box">💡 Dica: Seja sincero, fale com calma e mostre vontade de aprender.</div>
    </div>
  `;
}

function escapeHtml(text) {
  return text.replace(/[&<>]/g, function(m) {
    if(m === '&') return '&amp;';
    if(m === '<') return '&lt;';
    if(m === '>') return '&gt;';
    return m;
  }).replace(/\n/g, '<br>');
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input?.value.trim();
  if (!text || isLoading) return;

  messages.push({ role: 'user', text: text });
  isLoading = true;
  render();

  let reply = '';

  if (currentPersona === 'walter' && waitingForAnswer) {
    const currentQ = WALTER_QUESTIONS[questionIndex];
    const isLast = questionIndex === WALTER_QUESTIONS.length - 1;
    
    const systemPrompt = `Você é o Walter, recrutador profissional em Moçambique.

Pergunta feita: "${currentQ}"
Resposta do candidato: "${text}"

Avalie a resposta de forma PROFISSIONAL e CONSTRUTIVA:
1. Dê feedback sincero (bom, razoável, ou precisa melhorar)
2. Dê 1 dica específica para melhorar
3. Seja educado e encorajador
4. Máximo 40 palavras

${isLast ? 'Depois do feedback, PARABENIZE o candidato pelo fim da entrevista.' : `Depois do feedback, faça a PRÓXIMA pergunta: ${WALTER_QUESTIONS[questionIndex+1]}`}

Responda APENAS com o feedback + a próxima pergunta (ou parabéns).`;

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{ role: 'system', content: systemPrompt }],
          max_tokens: 250,
          temperature: 0.7
        })
      });
      const data = await res.json();
      reply = data.choices?.[0]?.message?.content || 'Obrigado pela resposta.';
      
      messages.push({ role: 'bot', text: reply });
      questionIndex++;
      
      if (questionIndex >= WALTER_QUESTIONS.length) {
        waitingForAnswer = false;
        messages.push({ role: 'bot', text: '🎉 Parabéns! Entrevista concluída! Você respondeu todas as perguntas. Boa sorte! 🎉' });
        triggerConfetti();
      }
    } catch(e) {
      messages.push({ role: 'bot', text: 'Erro de ligação. Tente novamente.' });
    }
  } else {
    const p = PERSONAS[currentPersona];
    const systemPrompt = `${p.prompt} Responda em português de Moçambique. Seja direto e útil. Máximo 80 palavras.`;
    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: text }],
          max_tokens: 300
        })
      });
      const data = await res.json();
      reply = data.choices?.[0]?.message?.content || 'Obrigado pela mensagem.';
      messages.push({ role: 'bot', text: reply });
    } catch(e) {
      messages.push({ role: 'bot', text: 'Erro de ligação. Tente novamente.' });
    }
  }
  
  isLoading = false;
  render();
  setTimeout(() => { const a = document.getElementById('messages-area'); if(a) a.scrollTop = a.scrollHeight; }, 100);
}

function triggerConfetti() {
  for(let i=0; i<60; i++){
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;width:8px;height:8px;background:${['#10b981','#f59e0b','#3b82f6'][Math.floor(Math.random()*3)]};top:${Math.random()*50}%;left:${Math.random()*100}%;z-index:9999;animation:fall 2s ease forwards;pointer-events:none;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
  showToast('🎉 Entrevista concluída! 🎉');
}

function renderCV() {
  return `<div><div style="display:flex;justify-content:space-between;margin-bottom:16px;"><h2>Validar CV</h2><button class="back-btn" onclick="showView('home')">← Voltar</button></div><div style="background:rgba(30,41,59,0.6);border-radius:18px;padding:20px;"><div class="upload-area" onclick="document.getElementById('cv-file').click()"><div style="font-size:36px;">📄</div><div>Carregue seu CV</div><div style="font-size:12px;">PDF, Word, TXT</div></div><input type="file" id="cv-file" style="display:none" /><div class="cv-area"><textarea id="cv-text" placeholder="Ou cole o texto do seu CV aqui..."></textarea></div><button class="btn-primary" onclick="analyzeCV()">🔍 Analisar CV</button><div id="cv-feedback" style="margin-top:16px;"></div></div><div style="background:linear-gradient(135deg,rgba(37,99,235,0.15),rgba(124,58,237,0.1));border-radius:18px;padding:16px;margin-top:14px;text-align:center;"><div class="premium-badge">⭐ PREMIUM</div><div style="margin-top:8px;"><strong>CV Profissional</strong><div style="font-size:12px;">Entrega 24h</div></div><button class="btn-primary" onclick="showView('payment')" style="background:#059669;">✨ Encomendar — 50 MT</button></div></div>`;
}

function analyzeCV() {
  const text = document.getElementById('cv-text')?.value.trim();
  if(!text) { showToast('Cole seu CV primeiro'); return; }
  document.getElementById('cv-feedback').innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  setTimeout(() => {
    document.getElementById('cv-feedback').innerHTML = '<div class="feedback-box" style="background:#1e293b;padding:16px;border-radius:12px;">📊 Análise: CV válido. Pontuação: 75/100. Dicas: Adicione mais experiência prática e objetivos claros.</div>';
  }, 1500);
}

function renderTemplates() {
  return `<div><div style="display:flex;justify-content:space-between;margin-bottom:16px;"><h2>Templates de CV</h2><button class="back-btn" onclick="showView('home')">← Voltar</button></div><div style="background:rgba(16,185,129,0.08);border-radius:12px;padding:12px;text-align:center;margin-bottom:16px;">🆓 <strong>100% Gratuitos</strong> — Edite no Canva</div><div class="template-grid">${[['Simples','📄','https://www.canva.com/resumes/templates/simple/'],['Moderno','✨','https://www.canva.com/resumes/templates/modern/'],['Profissional','💼','https://www.canva.com/resumes/templates/professional/'],['Criativo','🎨','https://www.canva.com/resumes/templates/creative/']].map(t => `<div class="template-card"><div style="font-size:34px;">${t[1]}</div><h3>${t[0]}</h3><button class="template-btn" onclick="window.open('${t[2]}','_blank')">🎨 Usar grátis</button></div>`).join('')}</div></div>`;
