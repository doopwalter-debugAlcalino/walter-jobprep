<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Walter JobPrep — Moçambique</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --font-sans: 'Inter', sans-serif; }
    body { font-family: var(--font-sans); background: #0a0f1e; min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #0f172a; color: #f1f5f9; display: flex; flex-direction: column; }
    .header { background: rgba(15,23,42,0.97); border-bottom: 1px solid #1e293b; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; color: #fff; }
    .logo-icon { width: 32px; height: 32px; background: #2563eb; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .nav { display: flex; gap: 4px; }
    .nav button { background: none; border: none; color: #64748b; font-size: 12px; cursor: pointer; font-family: var(--font-sans); padding: 6px 10px; border-radius: 8px; transition: all 0.2s; }
    .nav button:hover { color: #60a5fa; background: rgba(96,165,250,0.08); }
    .main { padding: 24px 20px; flex: 1; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 999px; background: rgba(37,99,235,0.1); border: 1px solid rgba(37,99,235,0.25); color: #60a5fa; font-size: 11px; font-weight: 500; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 600; color: #fff; line-height: 1.25; margin-bottom: 10px; }
    .gradient-text { background: linear-gradient(135deg, #60a5fa, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
    .stats { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: #64748b; margin-bottom: 28px; justify-content: center; }
    .section-title { text-align: center; font-size: 13px; font-weight: 500; color: #94a3b8; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .section-title::before, .section-title::after { content: ''; flex: 1; max-width: 40px; height: 1px; background: #1e293b; }
    .persona-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 24px; }
    .persona-card { background: rgba(30,41,59,0.5); border: 1px solid #334155; border-radius: 16px; padding: 18px 14px; cursor: pointer; text-align: left; transition: all 0.2s; width: 100%; }
    .persona-card:hover { border-color: rgba(37,99,235,0.5); background: rgba(30,41,59,0.9); transform: translateY(-1px); }
    .persona-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 20px; }
    .persona-name { font-size: 13px; font-weight: 600; color: #fff; }
    .persona-role { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
    .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
    .feature { background: rgba(30,41,59,0.4); border: 1px solid #1e293b; border-radius: 14px; padding: 16px 12px; cursor: pointer; transition: all 0.2s; text-align: center; }
    .feature:hover { background: rgba(30,41,59,0.8); border-color: #334155; }
    .feature-icon { font-size: 22px; margin-bottom: 8px; }
    .feature h3 { font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 3px; }
    .feature p { font-size: 11px; color: #64748b; line-height: 1.4; }
    .stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; background: rgba(15,23,42,0.6); border: 1px solid #1e293b; border-radius: 18px; padding: 20px 16px; text-align: center; }
    .stats-bar .num { font-size: 22px; font-weight: 600; color: #fff; }
    .stats-bar .lbl { font-size: 9px; color: #475569; text-transform: uppercase; margin-top: 3px; letter-spacing: 0.06em; }
    .back-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: color 0.2s; }
    .back-btn:hover { color: #fff; }
    .btn-primary { width: 100%; background: #2563eb; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: #1d4ed8; }
    .search-input { width: 100%; background: #0a0f1e; border: 1px solid #334155; border-radius: 12px; color: #fff; padding: 12px 16px; font-size: 13px; outline: none; margin-bottom: 16px; }
    .search-input:focus { border-color: #2563eb; }
    .company-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .company-btn { background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #94a3b8; font-size: 12px; padding: 8px 14px; cursor: pointer; transition: all 0.2s; }
    .company-btn:hover { border-color: #3b82f6; color: #fff; }
    .cv-area textarea { width: 100%; background: #0a0f1e; border: 1px solid #334155; border-radius: 12px; color: #e2e8f0; padding: 14px; font-size: 13px; resize: vertical; min-height: 120px; outline: none; }
    .cv-area textarea:focus { border-color: #2563eb; }
    .template-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
    .template-card { background: #1e293b; border-radius: 14px; overflow: hidden; border: 1px solid #334155; text-align: center; padding: 12px; }
    .template-card h3 { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 3px; }
    .template-card p { font-size: 11px; color: #64748b; margin-bottom: 10px; }
    .template-btn { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 9px; font-size: 12px; cursor: pointer; width: 100%; }
    .premium-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); color: #fff; font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 999px; display: inline-block; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      </div>
      Walter JobPrep
    </div>
    <div class="nav">
      <button onclick="showView('home')">Início</button>
      <button onclick="showView('cv')">Validar CV</button>
      <button onclick="showView('templates')">Templates</button>
    </div>
  </div>
  <div class="main" id="app-content"></div>
</div>

<script>
const PERSONAS = {
  walter: { name: 'Walter Recrutador', role: 'Entrevista Profissional', icon: '💼', bg: 'rgba(37,99,235,0.2)' },
  maria:  { name: 'Maria Escrita',    role: 'Especialista em CV',      icon: '📄', bg: 'rgba(124,58,237,0.2)' },
  antonio:{ name: 'António Técnico',  role: 'Especialista Prático',    icon: '🔧', bg: 'rgba(71,85,105,0.2)' },
  delfina:{ name: 'Delfina Psicóloga',role: 'Confiança e Postura',     icon: '⭐', bg: 'rgba(5,150,105,0.2)' }
};

const COMPANIES = ['Recheio (Maputo)','Mozal','CMC','TotalEnergies','BIM','Sasol','Vulcan','Porto de Maputo','Shoprite','KFC Moçambique','Coca-Cola (Matola)','EDM','HCB (Songo)'];

let currentView = 'home';

function showView(view) {
  currentView = view;
  render();
}

function render() {
  const el = document.getElementById('app-content');
  if (currentView === 'home') el.innerHTML = renderHome();
  else if (currentView === 'cv') el.innerHTML = renderCV();
  else if (currentView === 'templates') el.innerHTML = renderTemplates();
  else if (currentView === 'company') el.innerHTML = renderCompany();
}

function renderHome() {
  return `
    <div style="text-align:center;max-width:420px;margin:0 auto 28px;">
      <div class="badge">🇲🇿 O Futuro do Trabalho em Moçambique</div>
      <h1>Prepara-te para o <span class="gradient-text">Sucesso Profissional</span></h1>
      <p class="subtitle">Seja graduado ou trabalhador prático, ajudamos-te a conseguir as melhores oportunidades.</p>
      <div class="stats">
        <span>👥 +5.000 preparados</span>
        <span>🏆 85% aprovação</span>
        <span>📍 Maputo a Palma</span>
      </div>
    </div>
    <div class="section-title">Com quem queres treinar hoje?</div>
    <div class="persona-grid">
      ${Object.entries(PERSONAS).map(([id, p]) => `
        <div class="persona-card" onclick="showView('company')">
          <div class="persona-icon" style="background:${p.bg}">${p.icon}</div>
          <div class="persona-name">${p.name}</div>
          <div class="persona-role">${p.role}</div>
        </div>
      `).join('')}
    </div>
    <div class="features">
      <div class="feature" onclick="showView('cv')">
        <div class="feature-icon">📋</div>
        <h3>Validar CV</h3>
        <p>Análise para o mercado real</p>
      </div>
      <div class="feature" onclick="showView('templates')">
        <div class="feature-icon">🎨</div>
        <h3>Templates</h3>
        <p>Designs profissionais</p>
      </div>
      <div class="feature" onclick="showView('company')">
        <div class="feature-icon">💬</div>
        <h3>Entrevista</h3>
        <p>Simulação com IA</p>
      </div>
    </div>
    <div class="stats-bar">
      <div><div class="num">400+</div><div class="lbl">Empresas</div></div>
      <div><div class="num" style="color:#60a5fa">24/7</div><div class="lbl">Disponível</div></div>
      <div><div class="num" style="color:#a78bfa">100%</div><div class="lbl">Moz Style</div></div>
      <div><div class="num" style="color:#34d399">Grátis</div><div class="lbl">Simulação</div></div>
    </div>`;
}

function renderCV() {
  return `
    <div style="max-width:480px;margin:0 auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="font-size:20px;font-weight:600;">Validar CV</h2>
        <button class="back-btn" onclick="showView('home')">← Voltar</button>
      </div>
      <div style="background:rgba(30,41,59,0.6);border:1px solid #334155;border-radius:18px;padding:20px;margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
          <span style="font-size:20px;">🔍</span>
          <div style="font-size:15px;font-weight:700;">Análise Gratuita de CV</div>
          <div style="background:rgba(16,185,129,0.15);color:#34d399;font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;margin-left:auto;">GRÁTIS</div>
        </div>
        <div class="cv-area">
          <textarea id="cv-text" placeholder="Cola aqui o texto do teu CV ou descreve a tua experiência profissional..."></textarea>
        </div>
        <button class="btn-primary" onclick="analyzeCV()" style="margin-top:12px;">🔍 Analisar o meu CV</button>
        <div id="cv-feedback" style="margin-top:16px;"></div>
      </div>
      <div style="background:linear-gradient(135deg,rgba(37,99,235,0.15),rgba(124,58,237,0.1));border:1px solid rgba(37,99,235,0.35);border-radius:18px;padding:18px;position:relative;">
        <div style="position:absolute;top:10px;right:12px;" class="premium-badge">⭐ PREMIUM</div>
        <div style="margin-top:6px;">
          <div style="font-size:14px;font-weight:700;">CV Profissional Completo</div>
          <div style="font-size:11px;color:#94a3b8;margin-bottom:12px;">Feito por IA + Design Canva · Entrega 24h</div>
        </div>
        <button class="btn-primary" onclick="showPayment()" style="background:linear-gradient(135deg,#2563eb,#7c3aed);">✨ Encomendar CV — 50 MT</button>
      </div>
    </div>`;
}

function renderTemplates() {
  const templates = [
    { name: 'Executivo Moderno', desc: 'Para cargos de liderança', emoji: '👔', link: 'https://www.canva.com/resumes/templates/professional/' },
    { name: 'Criativo', desc: 'Para marketing e design', emoji: '🎨', link: 'https://www.canva.com/resumes/templates/creative/' },
    { name: 'Académico', desc: 'Histórico detalhado', emoji: '🎓', link: 'https://www.canva.com/resumes/templates/simple/' },
    { name: 'Jovem Talento', desc: 'Primeiro emprego', emoji: '🌟', link: 'https://www.canva.com/resumes/templates/modern/' },
    { name: 'Técnico', desc: 'Áreas operacionais', emoji: '🔧', link: 'https://www.canva.com/resumes/templates/' },
    { name: 'Comercial', desc: 'Vendas e negócios', emoji: '💼', link: 'https://www.canva.com/resumes/templates/' }
  ];
  return `
    <div style="max-width:480px;margin:0 auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="font-size:20px;font-weight:600;">Templates de CV</h2>
        <button class="back-btn" onclick="showView('home')">← Voltar</button>
      </div>
      <div style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);border-radius:12px;padding:12px;margin-bottom:16px;text-align:center;">
        <span style="font-size:18px;">🆓</span> <strong style="color:#34d399;">100% Gratuitos</strong> — Clica e edita no Canva
      </div>
      <div class="template-grid">
        ${templates.map(t => `
          <div class="template-card">
            <div style="font-size:34px;">${t.emoji}</div>
            <h3>${t.name}</h3>
            <p>${t.desc}</p>
            <button class="template-btn" onclick="window.open('${t.link}','_blank')">🎨 Usar Grátis</button>
          </div>
        `).join('')}
      </div>
      <div style="text-align:center;margin-top:16px;padding:12px;border-top:1px solid #1e293b;">
        <div style="font-size:11px;color:#475569;">🚀 Em breve: Canva Pro</div>
      </div>
    </div>`;
}

function renderCompany() {
  return `
    <div style="max-width:420px;margin:0 auto;text-align:center;">
      <div style="font-size:32px;margin-bottom:14px;">🔍</div>
      <h2 style="font-size:20px;font-weight:600;margin-bottom:8px;">Onde queres trabalhar?</h2>
      <p style="color:#94a3b8;font-size:13px;margin-bottom:20px;">Digita o nome da empresa para simular uma entrevista.</p>
      <input class="search-input" id="company-search" placeholder="Ex: Mozal, Shoprite, BIM..."/>
      <div style="font-size:10px;color:#475569;margin-bottom:10px;">Sugestões</div>
      <div class="company-grid">
        ${COMPANIES.map(c => `<button class="company-btn" onclick="alert('Função de entrevista com IA em desenvolvimento! Em breve disponível.')">${c}</button>`).join('')}
      </div>
      <button class="btn-primary" onclick="showView('home')" style="margin-top:12px;">← Voltar</button>
    </div>`;
}

function analyzeCV() {
  const text = document.getElementById('cv-text')?.value.trim();
  if (!text) {
    document.getElementById('cv-feedback').innerHTML = '<div style="color:#f87171;padding:12px;background:#1e293b;border-radius:12px;">⚠️ Escreve ou cola o teu CV primeiro.</div>';
    return;
  }
  const score = Math.floor(Math.random() * (85 - 45 + 1) + 45);
  const strengths = text.includes('experiência') ? '✅ Menciona experiência profissional' : '⚠️ Adicione mais detalhes da sua experiência';
  document.getElementById('cv-feedback').innerHTML = `
    <div style="background:#1e293b;border-radius:16px;padding:16px;">
      <div style="font-weight:700;margin-bottom:12px;">📊 Pontuação: ${score}/100</div>
      <div style="font-size:13px;margin-bottom:12px;">${strengths}</div>
      <div style="font-size:12px;color:#94a3b8;">💡 Dica: Adicione palavras como "resultados", "líder", "formação" para melhorar o score.</div>
    </div>`;
}

function showPayment() {
  const el = document.getElementById('app-content');
  el.innerHTML = `
    <div style="max-width:420px;margin:0 auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="font-size:18px;font-weight:600;">💳 Pagamento</h2>
        <button class="back-btn" onclick="showView('cv')">← Voltar</button>
      </div>
      <div style="background:linear-gradient(135deg,rgba(37,99,235,0.2),rgba(124,58,237,0.1));border:1px solid rgba(37,99,235,0.3);border-radius:18px;padding:20px;text-align:center;">
        <div style="font-size:40px;margin-bottom:8px;">📱</div>
        <h3 style="font-size:16px;font-weight:700;margin-bottom:4px;">Paga via e-Mola</h3>
        <p style="font-size:13px;color:#94a3b8;margin-bottom:16px;">Envia 50 MT para o número abaixo</p>
        <div style="background:#0a0f1e;border-radius:14px;padding:16px;margin-bottom:12px;">
          <div style="font-size:11px;color:#64748b;margin-bottom:6px;">Número e-Mola</div>
          <div style="font-size:28px;font-weight:700;color:#60a5fa;">878 144 427</div>
        </div>
        <button class="btn-primary" onclick="window.open('https://wa.me/258878144427?text=Olá! Quero o meu CV Premium (50 MT)','_blank')" style="background:linear-gradient(135deg,#059669,#047857);">✅ Enviar Comprovativo via WhatsApp</button>
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
