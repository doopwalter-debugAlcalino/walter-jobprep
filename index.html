window.hF = async function(i) {
  const f = i.files[0];
  if (!f) return;
  const ta = document.getElementById('cT');
  ta.value = '⏳ A processar...';
  if (f.type === 'text/plain') {
    const r = new FileReader();
    r.onload = (e) => ta.value = e.target.result.substring(0, 5000);
    r.readAsText(f);
  } else if (f.type === 'application/pdf') {
    try {
      const ab = await f.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
      let ft = '';
      for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
        const p = await pdf.getPage(i);
        const tc = await p.getTextContent();
        ft += tc.items.map(item => item.str).join(' ') + '\n';
      }
      ta.value = ft.substring(0, 5000);
      tS('✅ CV carregado!');
    } catch(e) { ta.value = 'Erro ao ler PDF. Cole manualmente.'; }
  } else { ta.value = `[${f.name}] - Cole o conteúdo manualmente.`; }
};

window.aCV = async function() {

};
