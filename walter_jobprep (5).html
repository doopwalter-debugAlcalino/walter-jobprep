<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walter JobPrep — Moçambique</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --font-sans: 'Inter', sans-serif; }
    body { font-family: var(--font-sans); background: #0a0f1e; min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #0f172a; color: #f1f5f9; display: flex; flex-direction: column; }
    .header { background: rgba(15,23,42,0.97); border-bottom: 1px solid #1e293b; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; color: #fff; }
    .logo-icon { width: 32px; height: 32px; background: #2563eb; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .nav { display: flex; gap: 4px; }
    .nav button { background: none; border: none; color: #64748b; font-size: 12px; cursor: pointer; font-family: var(--font-sans); padding: 6px 10px; border-radius: 8px; transition: all 0.2s; }
    .nav button:hover { color: #60a5fa; background: rgba(96,165,250,0.08); }
    .main { padding: 24px 20px; flex: 1; }

    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 999px; background: rgba(37,99,235,0.1); border: 1px solid rgba(37,99,235,0.25); color: #60a5fa; font-size: 11px; font-weight: 500; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 600; color: #fff; line-height: 1.25; margin-bottom: 10px; }
    .gradient-text { background: linear-gradient(135deg, #60a5fa, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
    .stats { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: #64748b; margin-bottom: 28px; }

    .section-title { text-align: center; font-size: 13px; font-weight: 500; color: #94a3b8; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .section-title::before, .section-title::after { content: ''; flex: 1; max-width: 40px; height: 1px; background: #1e293b; }

    .persona-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 24px; }
    .persona-card { background: rgba(30,41,59,0.5); border: 1px solid #334155; border-radius: 16px; padding: 18px 14px; cursor: pointer; text-align: left; transition: all 0.2s; color: #f1f5f9; font-family: var(--font-sans); width: 100%; }
    .persona-card:hover { border-color: rgba(37,99,235,0.5); background: rgba(30,41,59,0.9); transform: translateY(-1px); }
    .persona-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 20px; }
    .persona-name { font-size: 13px; font-weight: 600; color: #fff; }
    .persona-role { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

    .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
    .feature { background: rgba(30,41,59,0.4); border: 1px solid #1e293b; border-radius: 14px; padding: 16px 12px; cursor: pointer; transition: all 0.2s; }
    .feature:hover { background: rgba(30,41,59,0.8); border-color: #334155; }
    .feature-icon { font-size: 22px; margin-bottom: 8px; }
    .feature h3 { font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 3px; }
    .feature p { font-size: 11px; color: #64748b; line-height: 1.4; }

    .stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; background: rgba(15,23,42,0.6); border: 1px solid #1e293b; border-radius: 18px; padding: 20px 16px; text-align: center; }
    .stats-bar .num { font-size: 22px; font-weight: 600; color: #fff; }
    .stats-bar .lbl { font-size: 9px; color: #475569; text-transform: uppercase; margin-top: 3px; letter-spacing: 0.06em; }

    /* CHAT */
    .chat-wrap { display: flex; flex-direction: column; height: calc(100vh - 130px); max-height: 680px; }
    .chat-top { background: #0f172a; border-bottom: 1px solid #1e293b; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    .chat-persona { display: flex; align-items: center; gap: 10px; }
    .chat-persona-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .chat-persona-name { font-size: 13px; font-weight: 600; color: #fff; }
    .chat-persona-role { font-size: 10px; color: #60a5fa; text-transform: uppercase; letter-spacing: 0.05em; }
    .back-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: var(--font-sans); transition: color 0.2s; }
    .back-btn:hover { color: #fff; }
    .messages { flex: 1; overflow-y: auto; padding: 18px 14px; display: flex; flex-direction: column; gap: 14px; background: rgba(15,23,42,0.5); }
    .msg { display: flex; gap: 8px; max-width: 88%; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; margin-top: 2px; }
    .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.65; }
    .msg.bot .msg-bubble { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; border-top-left-radius: 3px; }
    .msg.user .msg-bubble { background: #2563eb; color: #fff; border-top-right-radius: 3px; }
    .typing { display: flex; gap: 4px; padding: 12px 16px; background: #1e293b; border: 1px solid #334155; border-radius: 14px; border-top-left-radius: 3px; width: fit-content; }
    .dot { width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; animation: pulse 1s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
    .input-area { padding: 12px 14px; background: #0f172a; border-top: 1px solid #1e293b; }
    .input-row { display: flex; gap: 8px; background: #1e293b; border-radius: 14px; border: 1px solid #334155; padding: 5px 6px; }
    .input-row input { flex: 1; background: none; border: none; outline: none; color: #fff; font-size: 13px; padding: 7px 10px; font-family: var(--font-sans); min-width: 0; }
    .input-row input::placeholder { color: #475569; }
    .send-btn { background: #2563eb; border: none; border-radius: 10px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.2s; }
    .send-btn:hover { background: #1d4ed8; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* CV */
    .cv-area textarea { width: 100%; background: #0a0f1e; border: 1px solid #334155; border-radius: 12px; color: #e2e8f0; padding: 14px; font-size: 13px; font-family: var(--font-sans); resize: vertical; min-height: 160px; outline: none; transition: border 0.2s; }
    .cv-area textarea:focus { border-color: #2563eb; }
    .btn-primary { width: 100%; background: #2563eb; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font-sans); transition: background 0.2s; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .feedback-box { background: #1e293b; border: 1px solid rgba(37,99,235,0.3); border-radius: 14px; padding: 20px; margin-top: 16px; font-size: 13px; line-height: 1.75; color: #cbd5e1; white-space: pre-wrap; }

    /* Company */
    .company-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .company-btn { background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #94a3b8; font-size: 12px; padding: 8px 14px; cursor: pointer; font-family: var(--font-sans); transition: all 0.2s; }
    .company-btn:hover { border-color: #3b82f6; color: #fff; }
    .search-input { width: 100%; background: #0a0f1e; border: 1px solid #334155; border-radius: 12px; color: #fff; padding: 12px 16px; font-size: 13px; font-family: var(--font-sans); outline: none; margin-bottom: 16px; }
    .search-input:focus { border-color: #2563eb; }
    .section-label { font-size: 10px; font-weight: 500; color: #475569; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      </div>
      Walter JobPrep
    </div>
    <div class="nav">
      <button onclick="showView('home')">Início</button>
      <button onclick="showView('cv')">Validar CV</button>
      <button onclick="showView('templates')">Templates</button>
    </div>
  </div>
  <div class="main" id="app-content"></div>
</div>

<script>
const GROQ_KEY = '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';

const PERSONAS = {
  walter: { name: 'Walter Recrutador', role: 'Entrevista Profissional', icon: '💼', color: '#2563eb', bg: 'rgba(37,99,235,0.2)', greeting: 'Olá! Sou o **Walter**. Estou aqui para te preparar para a tua próxima entrevista. Para qual vaga e empresa pretendes concorrer?' },
  maria:  { name: 'Maria Escrita',    role: 'Especialista em CV',      icon: '📄', color: '#7c3aed', bg: 'rgba(124,58,237,0.2)', greeting: 'Olá! Sou a **Maria**. Vamos valorizar a tua experiência. Podes enviar o teu CV ou pedir dicas para melhorá-lo?' },
  antonio:{ name: 'António Técnico',  role: 'Especialista Prático',    icon: '🔧', color: '#475569', bg: 'rgba(71,85,105,0.2)',   greeting: 'Saudações, sou o **António**. Vamos directo ao ponto: o que sabes fazer na prática e para que cargo estás a olhar?' },
  delfina:{ name: 'Delfina Psicóloga',role: 'Confiança e Postura',     icon: '⭐', color: '#059669', bg: 'rgba(5,150,105,0.2)',   greeting: 'Olá! Sou a **Delfina**. O teu valor vai além do diploma. Como te sentes em relação à tua busca de emprego hoje?' }
};

const COMPANIES = ['Recheio (Maputo)','Mozal','CMC','TotalEnergies','BIM','Sasol','Vulcan','Porto de Maputo','Shoprite','KFC Moçambique','Coca-Cola (Matola)','EDM','HCB (Songo)'];

let currentView = 'home';
let currentPersona = 'walter';
let currentCompany = '';
let messages = [];
let isLoading = false;

function startPersona(id) {
  messages = [];
  showView('chat', id, '');
}

function showView(view, persona, company) {
  currentView = view;
  if (persona) currentPersona = persona;
  if (company !== undefined) currentCompany = company;
  if (view === 'chat' && messages.length === 0) {
    const greeting = company
      ? `Olá! Sou o **Walter**. O processo para a **${company}** exige seriedade. Para que vaga específica estás a concorrer?`
      : PERSONAS[currentPersona].greeting;
    messages = [{ role: 'bot', text: greeting }];
  }
  render();
}

function render() {
  const el = document.getElementById('app-content');
  if (currentView === 'home') el.innerHTML = renderHome();
  else if (currentView === 'chat') el.innerHTML = renderChat();
  else if (currentView === 'cv') el.innerHTML = renderCV();
  else if (currentView === 'company') el.innerHTML = renderCompany();
  else if (currentView === 'templates') el.innerHTML = renderTemplates();

  if (currentView === 'chat') {
    scrollMessages();
    document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  }
  if (currentView === 'cv') {
    document.getElementById('cv-text').addEventListener('input', e => {
      document.getElementById('analyze-btn').disabled = !e.target.value.trim();
    });
  }
  if (currentView === 'company') {
    document.getElementById('company-search').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.value.trim()) { messages = []; showView('chat', 'walter', e.target.value.trim()); }
    });
  }
}

function renderHome() {
  return `
    <div style="text-align:center;max-width:420px;margin:0 auto 28px;">
      <div class="badge">🇲🇿 O Futuro do Trabalho em Moçambique</div>
      <h1>Prepara-te para o <span class="gradient-text">Sucesso Profissional</span></h1>
      <p class="subtitle">Seja graduado ou trabalhador prático, ajudamos-te a conseguir as melhores oportunidades em qualquer província.</p>
      <div class="stats" style="justify-content:center;">
        <span>👥 +5.000 preparados</span>
        <span>🏆 85% aprovação</span>
        <span>📍 Maputo a Palma</span>
      </div>
    </div>
    <div class="section-title">Com quem queres treinar hoje?</div>
    <div class="persona-grid">
      ${Object.entries(PERSONAS).map(([id, p]) => `
        <button class="persona-card" onclick="startPersona('${id}')">
          <div class="persona-icon" style="background:${p.bg}">${p.icon}</div>
          <div class="persona-name">${p.name}</div>
          <div class="persona-role">${p.role}</div>
        </button>
      `).join('')}
    </div>
    <div class="features">
      <div class="feature" onclick="showView('cv')">
        <div class="feature-icon">📋</div>
        <h3>Validar CV</h3>
        <p>Análise para o mercado real de Moçambique</p>
      </div>
      <div class="feature" onclick="showView('templates')">
        <div class="feature-icon">🎨</div>
        <h3>Templates</h3>
        <p>Designs de alto impacto para impressionar</p>
      </div>
      <div class="feature" onclick="messages=[];showView('chat','delfina','')">
        <div class="feature-icon">💬</div>
        <h3>Suporte</h3>
        <p>Confiança e postura para brilhar</p>
      </div>
    </div>
    <div class="stats-bar">
      <div><div class="num">400+</div><div class="lbl">Empresas</div></div>
      <div><div class="num" style="color:#60a5fa">24/7</div><div class="lbl">Disponível</div></div>
      <div><div class="num" style="color:#a78bfa">100%</div><div class="lbl">Moz Style</div></div>
      <div><div class="num" style="color:#34d399">Grátis</div><div class="lbl">Simulação</div></div>
    </div>`;
}

function renderChat() {
  const p = PERSONAS[currentPersona];
  return `
    <div class="chat-wrap">
      <div class="chat-top">
        <div class="chat-persona">
          <div class="chat-persona-icon" style="background:${p.bg}">${p.icon}</div>
          <div>
            <div class="chat-persona-name">${p.name}${currentCompany ? ' — ' + currentCompany : ''}</div>
            <div class="chat-persona-role">${p.role}</div>
          </div>
        </div>
        <button class="back-btn" onclick="messages=[];showView('home')">← Sair</button>
      </div>
      <div class="messages" id="messages-area">
        ${messages.map(m => renderMessage(m)).join('')}
        ${isLoading ? `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>` : ''}
      </div>
      <div class="input-area">
        <div class="input-row">
          <input id="msg-input" placeholder="Escreve a tua resposta..." ${isLoading ? 'disabled' : ''}/>
          <button class="send-btn" onclick="sendMessage()" ${isLoading ? 'disabled' : ''}>
            <svg width="15" height="15" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>`;
}

function renderMessage(m) {
  const p = PERSONAS[currentPersona];
  const isUser = m.role === 'user';
  return `
    <div class="msg ${isUser ? 'user' : 'bot'}">
      <div class="msg-icon" style="background:${isUser ? '#2563eb' : p.bg}">${isUser ? '👤' : p.icon}</div>
      <div class="msg-bubble">${formatText(m.text)}</div>
    </div>`;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function scrollMessages() {
  const area = document.getElementById('messages-area');
  if (area) setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input?.value?.trim();
  if (!text || isLoading) return;

  messages.push({ role: 'user', text });
  isLoading = true;
  render();

  const p = PERSONAS[currentPersona];
  const systemPrompt = `És ${p.name}, um assistente de carreira especializado para o mercado de trabalho de Moçambique.
Papel: ${p.role}
${currentCompany ? `A entrevista é para a empresa: ${currentCompany}.` : ''}
Responde sempre em Português de Moçambique. Sê profissional, motivador e prático.
${currentPersona === 'walter' ? 'Faz perguntas de entrevista realistas e dá feedback construtivo. Quando o candidato responde bem, elogia com "Aprovado" ou "Parabéns".' : ''}
${currentPersona === 'maria' ? 'Ajuda a melhorar CVs com dicas práticas para o mercado moçambicano.' : ''}
${currentPersona === 'antonio' ? 'Foca nas competências práticas e técnicas. Vai directo ao ponto.' : ''}
${currentPersona === 'delfina' ? 'Ajuda com confiança, postura e bem-estar emocional na busca de emprego.' : ''}
Mantém respostas concisas (máx 150 palavras). Nunca menciones que és uma IA.`;

  const apiMessages = messages.slice(0,-1).map(m => ({
    role: m.role === 'user' ? 'user' : 'assistant',
    content: m.text
  }));
  apiMessages.push({ role: 'user', content: text });

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'system', content: systemPrompt }, ...apiMessages],
        max_tokens: 500,
        temperature: 0.7
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Erro ao obter resposta.';
    messages.push({ role: 'bot', text: reply });
    if (reply.toLowerCase().includes('aprovado') || reply.toLowerCase().includes('parabéns')) {
      setTimeout(() => triggerConfetti(), 300);
    }
  } catch(e) {
    messages.push({ role: 'bot', text: 'Erro de ligação. Tenta novamente.' });
  }

  isLoading = false;
  render();
}

function triggerConfetti() {
  const colors = ['#2563eb','#4f46e5','#10b981','#f59e0b'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;width:8px;height:8px;border-radius:2px;background:${colors[Math.floor(Math.random()*colors.length)]};top:${Math.random()*30}%;left:${Math.random()*100}%;z-index:9999;pointer-events:none;animation:fall ${1+Math.random()*2}s ease-in forwards;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
  const style = document.createElement('style');
  style.textContent = '@keyframes fall{to{transform:translateY(100vh) rotate(720deg);opacity:0}}';
  document.head.appendChild(style);
}

function renderCV() {
  return `
    <div style="max-width:480px;margin:0 auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="font-size:20px;font-weight:600;color:#fff;">Validar CV</h2>
        <button class="back-btn" onclick="showView('home')">← Voltar</button>
      </div>

      <!-- FREE ANALYSIS -->
      <div style="background:rgba(30,41,59,0.6);border:1px solid #334155;border-radius:18px;padding:20px;margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <span style="font-size:20px;">🔍</span>
          <div style="font-size:15px;font-weight:700;color:#fff;">Análise Gratuita de CV</div>
          <div style="background:rgba(16,185,129,0.15);color:#34d399;font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;margin-left:auto;">GRÁTIS</div>
        </div>
        <p style="font-size:12px;color:#64748b;margin-bottom:16px;">A nossa IA analisa o teu CV e dá feedback profissional detalhado.</p>

        <!-- FILE UPLOAD AREA -->
        <div id="upload-area" onclick="document.getElementById('cv-file').click()" style="border:2px dashed #334155;border-radius:14px;padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:12px;background:rgba(15,23,42,0.4);"
          onmouseover="this.style.borderColor='#3b82f6';this.style.background='rgba(37,99,235,0.08)'"
          onmouseout="this.style.borderColor='#334155';this.style.background='rgba(15,23,42,0.4)'">
          <div style="font-size:36px;margin-bottom:8px;">📄</div>
          <div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:4px;">Carregar CV do dispositivo</div>
          <div style="font-size:12px;color:#64748b;">Clica aqui para escolher o ficheiro</div>
          <div style="font-size:11px;color:#475569;margin-top:6px;">Suporta PDF, Word (.docx), TXT</div>
        </div>
        <input type="file" id="cv-file" accept=".pdf,.doc,.docx,.txt" style="display:none" onchange="handleFileUpload(this)" />

        <div style="text-align:center;color:#475569;font-size:12px;margin-bottom:12px;">— ou escreve/cola directamente —</div>

        <div class="cv-area" style="margin-bottom:12px;">

function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('file-info').style.display = 'flex';
  document.getElementById('file-name').textContent = file.name;

  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    document.getElementById('cv-text').value = text.substring(0, 3000);
    document.getElementById('analyze-btn').disabled = false;
    document.getElementById('analyze-btn').style.opacity = '1';
    document.getElementById('analyze-btn').style.cursor = 'pointer';
  };

  if (file.type === 'application/pdf') {
    document.getElementById('cv-text').value = '[Ficheiro PDF carregado: ' + file.name + ']\n\nPor favor descreve o conteúdo principal do teu CV abaixo para a análise completa.';
    document.getElementById('analyze-btn').disabled = false;
    document.getElementById('analyze-btn').style.opacity = '1';
    document.getElementById('analyze-btn').style.cursor = 'pointer';
  } else {
    reader.readAsText(file);
  }
}

document.addEventListener('input', function(e) {
  if (e.target && e.target.id === 'cv-text') {
    const btn = document.getElementById('analyze-btn');
    if (btn) {
      const hasText = e.target.value.trim().length > 10;
      btn.disabled = !hasText;
      btn.style.opacity = hasText ? '1' : '0.5';
      btn.style.cursor = hasText ? 'pointer' : 'not-allowed';
    }
  }
});
}

async function analyzeCV() {
  const text = document.getElementById('cv-text').value.trim();
  if (!text) return;
  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('analyze-btn').textContent = '⏳ Maria está a analisar...';
  document.getElementById('cv-feedback').innerHTML = `
    <div style="margin-top:16px;background:rgba(37,99,235,0.08);border:1px solid rgba(37,99,235,0.2);border-radius:14px;padding:16px;text-align:center;">
      <div class="typing" style="justify-content:center;margin-bottom:10px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <div style="font-size:12px;color:#64748b;">A Maria está a fazer a análise mais completa do teu CV...</div>
    </div>`;

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: `És a Maria, a melhor especialista em CVs de Moçambique com 15 anos de experiência em RH nas maiores empresas do país. Fazes a análise de CV mais completa e profissional possível.

Quando analisares um CV, estrutura a tua resposta EXACTAMENTE assim:

## 📊 Pontuação Geral: X/10

## ✅ Pontos Fortes
(lista os pontos positivos do CV)

## ⚠️ Problemas Críticos
(lista os problemas que impedem a contratação)

## 🎯 Melhorias Prioritárias
1. (melhoria mais importante)
2. (segunda melhoria)
3. (terceira melhoria)
4. (quarta melhoria)
5. (quinta melhoria)

## 💼 Adequação ao Mercado Moçambicano
(avalia como o CV se adequa ao mercado local — empresas como Shoprite, BIM, Mozal, etc.)

## 🚀 Próximo Passo
(um conselho final poderoso e motivador)

Responde sempre em Português de Moçambique. Nunca menciones que és uma IA. Sê directa, profissional e genuinamente útil.` },
          { role: 'user', content: `Faz a análise mais completa e profissional possível deste CV para o mercado de Moçambique:\n\n${text}` }
        ],
        max_tokens: 1200,
        temperature: 0.7
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Erro na análise.';
    
    document.getElementById('cv-feedback').innerHTML = `
      <div style="margin-top:16px;background:rgba(30,41,59,0.8);border:1px solid rgba(37,99,235,0.3);border-radius:16px;padding:20px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1e293b;">
          <span style="font-size:20px;">👩‍💼</span>
          <div>
            <div style="font-size:13px;font-weight:700;color:#60a5fa;">Análise da Maria JobPrep</div>
            <div style="font-size:10px;color:#475569;">Especialista em Carreiras · Moçambique</div>
          </div>
        </div>
        <div style="font-size:13px;line-height:1.8;color:#cbd5e1;">${formatAnalysis(reply)}</div>
      </div>
      <button class="btn-primary" onclick="showPayment()" style="background:linear-gradient(135deg,#2563eb,#7c3aed);margin-top:14px;">✨ Quero o CV Profissional Completo — 50 MT</button>`;

  } catch(e) {
    document.getElementById('cv-feedback').innerHTML = '<div style="color:#f87171;text-align:center;margin-top:12px;font-size:13px;">Erro de ligação. Tenta novamente.</div>';
  }
  document.getElementById('analyze-btn').disabled = false;
  document.getElementById('analyze-btn').textContent = '🔍 Analisar o meu CV';
  document.getElementById('analyze-btn').style.opacity = '1';
}

function formatAnalysis(text) {
  return text
    .replace(/## (.*)/g, '<div style="font-size:14px;font-weight:700;color:#fff;margin-top:16px;margin-bottom:8px;">$1</div>')
    .replace(/\*\*(.*?)\*\*/g, '<strong style="color:#fff">$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^(\d+\. )/gm, '<span style="color:#60a5fa;font-weight:600">$1</span>')
    .replace(/^(- )/gm, '<span style="color:#34d399">▸ </span>')
    .replace(/\n/g, '<br>');
}
